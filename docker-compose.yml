services:
  db:
    image: postgres:16.9-alpine3.22
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comptabilite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-comptabilite}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comptabilite}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Pas de ports exposés vers l'hôte en production (réseau Docker interne uniquement)

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-comptabilite}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-comptabilite}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:?Definir JWT_SECRET dans .env}
      ENVIRONNEMENT: ${ENVIRONNEMENT:-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_MOT_DE_PASSE: ${ADMIN_MOT_DE_PASSE:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
