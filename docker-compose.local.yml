# Surcharge locale : expose PostgreSQL sur le port 5433 (dev uniquement)
services:
  db:
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comptabilite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comptabilite_dev_local}
      POSTGRES_DB: ${POSTGRES_DB:-comptabilite}
